name: Daily arXiv paper collection

on:
  schedule:
    # Run daily at 00:07 UTC (09:07 KST)
    - cron: '7 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect papers
        run: node scripts/collect-papers.mjs
        env:
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'auto: update arXiv paper data'
          commit_user_name: 'arXiv Collector Bot'
          commit_user_email: 'bot@arxiv-collector.local'
          file_pattern: data/papers.js
